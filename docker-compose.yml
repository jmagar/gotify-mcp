services:
  gotify-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gotify-mcp
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "${GOTIFY_MCP_PORT:-9158}:${GOTIFY_MCP_PORT:-9158}"
    env_file:
      - .env
    volumes:
      - gotify-mcp-logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import os,sys,urllib.request; port=os.environ.get('GOTIFY_MCP_PORT','9158'); urllib.request.urlopen(f'http://localhost:{port}/health',timeout=5); sys.exit(0)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - jakenet

volumes:
  gotify-mcp-logs:

networks:
  jakenet:
    name: ${DOCKER_NETWORK:-gotify-mcp}
    external: true
