name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --group dev
      - run: uv run ty check
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --group dev
      - run: uv run pytest
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --group dev
      - run: uv export --no-hashes | uv pip compile - -q | uv pip audit --stdin || true
  docker-security:
    name: Docker Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Dockerfile security
        run: bash scripts/check-docker-security.sh Dockerfile
      - name: Check no baked env vars
        run: bash scripts/check-no-baked-env.sh .
      - name: Check ignore files
        run: bash scripts/ensure-ignore-files.sh --check .

  mcp-integration:
    name: MCP Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run integration tests
        env:
          GOTIFY_URL: ${{ secrets.GOTIFY_URL }}
          GOTIFY_APP_TOKEN: ${{ secrets.GOTIFY_APP_TOKEN }}
          GOTIFY_CLIENT_TOKEN: ${{ secrets.GOTIFY_CLIENT_TOKEN }}
        run: bash tests/test_live.sh --mode docker
